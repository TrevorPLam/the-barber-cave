<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#shopGradient)"/>
  
  <!-- Barber shop interior elements -->
  <!-- Mirror -->
  <rect x="150" y="100" width="500" height="300" rx="20" fill="#d4a574" opacity="0.2"/>
  <rect x="170" y="120" width="460" height="260" rx="10" fill="#ffffff" opacity="0.1"/>
  
  <!-- Barber chairs -->
  <rect x="100" y="450" width="150" height="200" rx="20" fill="#000000" opacity="0.3"/>
  <rect x="550" y="450" width="150" height="200" rx="20" fill="#000000" opacity="0.3"/>
  
  <!-- Counter -->
  <rect x="50" y="680" width="700" height="80" rx="10" fill="#d4a574" opacity="0.3"/>
  
  <!-- Barber tools -->
  <g transform="translate(350, 500)">
    <!-- Scissors -->
    <path d="M0 0 L50 50 L0 100" stroke="#d4a574" stroke-width="4" fill="none" opacity="0.5"/>
    <path d="M100 0 L50 50 L100 100" stroke="#d4a574" stroke-width="4" fill="none" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#d4a574" opacity="0.6"/>
    <circle cx="100" cy="0" r="8" fill="#d4a574" opacity="0.6"/>
  </g>
  
  <!-- Barber pole -->
  <rect x="380" y="200" width="40" height="400" fill="#d4a574" opacity="0.4"/>
  <rect x="380" y="200" width="40" height="40" fill="#ffffff" opacity="0.2"/>
  <rect x="380" y="280" width="40" height="40" fill="#ffffff" opacity="0.2"/>
  <rect x="380" y="360" width="40" height="40" fill="#ffffff" opacity="0.2"/>
  <rect x="380" y="440" width="40" height="40" fill="#ffffff" opacity="0.2"/>
  <rect x="380" y="520" width="40" height="40" fill="#ffffff" opacity="0.2"/>
  
  <!-- Lighting fixtures -->
  <circle cx="200" cy="80" r="30" fill="#d4a574" opacity="0.3"/>
  <circle cx="400" cy="80" r="30" fill="#d4a574" opacity="0.3"/>
  <circle cx="600" cy="80" r="30" fill="#d4a574" opacity="0.3"/>
</svg>
