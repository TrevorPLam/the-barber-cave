<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <pattern id="barberPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#2d2d2d"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#d4a574" stroke-width="2" opacity="0.3"/>
      <path d="M50 20 L50 80 M20 50 L80 50" stroke="#d4a574" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#barberGradient)"/>
  <rect width="1920" height="1080" fill="url(#barberPattern)"/>
  
  <!-- Barber pole stripes -->
  <rect x="100" y="100" width="80" height="880" fill="#d4a574" opacity="0.1"/>
  <rect x="100" y="100" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="100" y="260" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="100" y="420" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="100" y="580" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="100" y="740" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="100" y="900" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  
  <!-- Second barber pole -->
  <rect x="1740" y="100" width="80" height="880" fill="#d4a574" opacity="0.1"/>
  <rect x="1740" y="180" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="1740" y="340" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="1740" y="500" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="1740" y="660" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="1740" y="820" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  <rect x="1740" y="980" width="80" height="80" fill="#ffffff" opacity="0.05"/>
  
  <!-- Central barber chair silhouette -->
  <ellipse cx="960" cy="540" rx="200" ry="300" fill="#000000" opacity="0.3"/>
  <rect x="860" y="440" width="200" height="200" rx="20" fill="#000000" opacity="0.4"/>
  
  <!-- Scissors icon -->
  <g transform="translate(860, 300)">
    <path d="M50 0 L100 50 L50 100 L0 50 Z" fill="#d4a574" opacity="0.2"/>
    <circle cx="25" cy="25" r="15" fill="none" stroke="#d4a574" stroke-width="3" opacity="0.3"/>
    <circle cx="75" cy="75" r="15" fill="none" stroke="#d4a574" stroke-width="3" opacity="0.3"/>
  </g>
  
  <!-- Text overlay -->
  <text x="960" y="540" font-family="Arial, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.3">THE BARBER CAVE</text>
  <text x="960" y="600" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#d4a574" opacity="0.2">DALLAS, TEXAS</text>
</svg>
