<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#beard)"/>
  
  <!-- Head silhouette -->
  <ellipse cx="300" cy="200" rx="100" ry="120" fill="#000000" opacity="0.4"/>
  
  <!-- Beard shape -->
  <path d="M200 280 Q300 320 400 280 L400 400 Q300 450 200 400 Z" fill="#000000" opacity="0.5"/>
  
  <!-- Razor -->
  <g transform="translate(250, 350)">
    <rect x="0" y="0" width="100" height="20" rx="5" fill="#d4a574" opacity="0.6"/>
    <rect x="10" y="5" width="80" height="10" fill="#c0c0c0" opacity="0.4"/>
    <line x1="20" y1="10" x2="80" y2="10" stroke="#000000" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.5">BEARD TRIM</text>
</svg>
