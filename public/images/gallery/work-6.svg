<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#shave)"/>
  
  <!-- Head silhouette -->
  <ellipse cx="300" cy="200" rx="100" ry="120" fill="#000000" opacity="0.4"/>
  
  <!-- Shaving cream areas -->
  <ellipse cx="300" cy="200" rx="80" ry="100" fill="#ffffff" opacity="0.2"/>
  
  <!-- Straight razor -->
  <g transform="translate(250, 380)">
    <rect x="0" y="0" width="100" height="15" rx="3" fill="#d4a574" opacity="0.7"/>
    <rect x="10" y="3" width="80" height="9" fill="#c0c0c0" opacity="0.5"/>
    <circle cx="15" cy="7.5" r="4" fill="#000000" opacity="0.6"/>
    <circle cx="85" cy="7.5" r="4" fill="#000000" opacity="0.6"/>
  </g>
  
  <!-- Brush -->
  <g transform="translate(200, 350)">
    <rect x="0" y="0" width="15" height="60" rx="3" fill="#8b4513" opacity="0.6"/>
    <ellipse cx="7.5" cy="0" rx="12" ry="20" fill="#ffffff" opacity="0.4"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.5">HOT TOWEL SHAVE</text>
</svg>
