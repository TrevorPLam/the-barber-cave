<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pompadour" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#pompadour)"/>
  
  <!-- Head silhouette with pompadour -->
  <ellipse cx="300" cy="250" rx="100" ry="120" fill="#000000" opacity="0.4"/>
  
  <!-- Pompadour shape -->
  <path d="M200 200 Q300 150 400 200 L400 250 Q300 280 200 250 Z" fill="#000000" opacity="0.5"/>
  
  <!-- Comb -->
  <g transform="translate(260, 380)">
    <rect x="0" y="0" width="80" height="30" rx="5" fill="#d4a574" opacity="0.6"/>
    <line x1="10" y1="5" x2="10" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="5" x2="20" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="5" x2="30" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="40" y1="5" x2="40" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="50" y1="5" x2="50" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="5" x2="60" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
    <line x1="70" y1="5" x2="70" y2="25" stroke="#000000" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.5">POMPADOUR</text>
</svg>
