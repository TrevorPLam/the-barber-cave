<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#fade1)"/>
  
  <!-- Head silhouette -->
  <ellipse cx="300" cy="250" rx="120" ry="150" fill="#000000" opacity="0.4"/>
  
  <!-- Fade lines -->
  <path d="M180 200 L180 350 M220 180 L220 370 M260 170 L260 380 M300 165 L300 385 M340 170 L340 380 M380 180 L380 370 M420 200 L420 350" 
        stroke="#d4a574" stroke-width="3" opacity="0.6"/>
  
  <!-- Clippers -->
  <g transform="translate(250, 400)">
    <rect x="0" y="0" width="100" height="40" rx="10" fill="#d4a574" opacity="0.5"/>
    <line x1="20" y1="0" x2="20" y2="40" stroke="#000000" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="0" x2="40" y2="40" stroke="#000000" stroke-width="2" opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="40" stroke="#000000" stroke-width="2" opacity="0.6"/>
    <line x1="80" y1="0" x2="80" y2="40" stroke="#000000" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.5">CLASSIC FADE</text>
</svg>
