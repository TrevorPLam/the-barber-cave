<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="url(#modern)"/>
  
  <!-- Head silhouette with modern cut -->
  <ellipse cx="300" cy="200" rx="110" ry="130" fill="#000000" opacity="0.4"/>
  
  <!-- Modern cut lines -->
  <path d="M190 200 Q250 180 300 185 Q350 180 410 200" stroke="#d4a574" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M200 250 L400 250" stroke="#d4a574" stroke-width="3" opacity="0.6"/>
  
  <!-- Textured sides -->
  <rect x="190" y="200" width="60" height="100" fill="#000000" opacity="0.3"/>
  <rect x="350" y="200" width="60" height="100" fill="#000000" opacity="0.3"/>
  
  <!-- Scissors -->
  <g transform="translate(250, 380)">
    <path d="M0 0 L50 50 L0 100" stroke="#d4a574" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M100 0 L50 50 L100 100" stroke="#d4a574" stroke-width="4" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#d4a574" opacity="0.7"/>
    <circle cx="100" cy="0" r="8" fill="#d4a574" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.5">MODERN CUT</text>
</svg>
