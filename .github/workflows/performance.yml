name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  performance:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build application
      run: npm run build
      
    - name: Start application for Lighthouse CI
      run: |
        npm start &
        sleep 10
        
    - name: Run performance tests
      run: npm run test:performance
      
    - name: Run performance tests with detailed collection
      run: npm run test:performance:collect
      
    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-results
        path: .lighthouseci
        
    - name: Comment PR with performance results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = '.lighthouseci/lhr-*.json';
          
          // Find the latest Lighthouse result file
          const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json'));
          if (files.length > 0) {
            const latestFile = files.sort().pop();
            const results = JSON.parse(fs.readFileSync(`.lighthouseci/${latestFile}`, 'utf8'));
            
            const categories = results.categories;
            const audits = results.audits;
            
            const comment = `
            ## 🚀 Performance Test Results
            
            ### Overall Scores
            🎯 **Performance**: ${Math.round(categories.performance.score * 100)}%
            ♿ **Accessibility**: ${Math.round(categories.accessibility.score * 100)}%
            🔧 **Best Practices**: ${Math.round(categories['best-practices'].score * 100)}%
            🔍 **SEO**: ${Math.round(categories.seo.score * 100)}%
            
            ### Core Web Vitals
            ⚡ **First Contentful Paint**: ${audits['first-contentful-paint'].displayValue}
            🖼️ **Largest Contentful Paint**: ${audits['largest-contentful-paint'].displayValue}
            📊 **Cumulative Layout Shift**: ${audits['cumulative-layout-shift'].displayValue}
            🚫 **Total Blocking Time**: ${audits['total-blocking-time'].displayValue}
            
            ### Resource Summary
            📦 **Total Size**: ${audits['total-byte-weight'].displayValue}
            📄 **Script Size**: ${audits['script-treemap-data'].details?.items?.reduce((sum, item) => sum + (item.bytes || 0), 0) || 'N/A'} bytes
            🎨 **Stylesheet Size**: ${audits['stylesheet-treemap-data'].details?.items?.reduce((sum, item) => sum + (item.bytes || 0), 0) || 'N/A'} bytes
            
            ---
            
            *This PR was automatically checked for performance regressions using Lighthouse CI.*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
      
    - name: Check performance budget compliance
      run: |
        echo "Checking if performance budgets were met..."
        if [ -f ".lighthouseci/lhr-*.json" ]; then
          echo "✅ Performance tests completed successfully"
        else
          echo "❌ Performance tests failed or incomplete"
          exit 1
        fi
