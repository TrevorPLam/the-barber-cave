name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  performance:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
        form-factor: [mobile, desktop]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build application
      run: npm run build
      
    - name: Start application for Lighthouse CI
      run: |
        npm start &
        sleep 10
        
    - name: Run ${{ matrix.form-factor }} performance tests
      run: npm run test:performance
      env:
        LHCI_FORM_FACTOR: ${{ matrix.form-factor }}
      
    - name: Upload Lighthouse ${{ matrix.form-factor }} results
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-results-${{ matrix.form-factor }}
        path: .lighthouseci
        
    - name: Comment PR with ${{ matrix.form-factor }} performance results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const formFactor = '${{ matrix.form-factor }}';
          
          // Find the latest Lighthouse result file
          const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json'));
          if (files.length > 0) {
            const latestFile = files.sort().pop();
            const results = JSON.parse(fs.readFileSync(`.lighthouseci/${latestFile}`, 'utf8'));
            
            const categories = results.categories;
            const audits = results.audits;
            const runWarnings = results.runWarnings || [];
            
            const comment = `
            ## 🚀 Performance Test Results (${formFactor.toUpperCase()})
            
            ### Overall Scores
            🎯 **Performance**: ${Math.round((categories.performance.score || 0) * 100)}%
            ♿ **Accessibility**: ${Math.round((categories.accessibility.score || 0) * 100)}%
            🔧 **Best Practices**: ${Math.round((categories['best-practices'].score || 0) * 100)}%
            🔍 **SEO**: ${Math.round((categories.seo.score || 0) * 100)}%
            
            ### Core Web Vitals
            ⚡ **First Contentful Paint**: ${audits['first-contentful-paint']?.displayValue || 'N/A'}
            🖼️ **Largest Contentful Paint**: ${audits['largest-contentful-paint']?.displayValue || 'N/A'}
            📊 **Cumulative Layout Shift**: ${audits['cumulative-layout-shift']?.displayValue || 'N/A'}
            🚫 **Total Blocking Time**: ${audits['total-blocking-time']?.displayValue || 'N/A'}
            
            ### Environment
            � **Form Factor**: ${results.configSettings?.formFactor || formFactor}
            🌐 **URL**: ${results.requestedUrl}
            
            ${runWarnings.length > 0 ? `⚠️ **Warnings**: ${runWarnings.join(', ')}` : ''}
            
            ---
            
            *Tested on ${formFactor} with Lighthouse CI.*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
      
    - name: Check ${{ matrix.form-factor }} performance budget compliance
      run: |
        echo "Checking if ${{ matrix.form-factor }} performance budgets were met..."
        if [ -f ".lighthouseci/lhr-*.json" ]; then
          echo "✅ ${{ matrix.form-factor }} performance tests completed successfully"
        else
          echo "❌ ${{ matrix.form-factor }} performance tests failed or incomplete"
          exit 1
        fi
