<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barber1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#barber1)"/>
  
  <!-- Head silhouette -->
  <ellipse cx="200" cy="150" rx="80" ry="100" fill="#000000" opacity="0.4"/>
  
  <!-- Professional haircut -->
  <path d="M120 140 Q200 120 280 140" stroke="#d4a574" stroke-width="3" opacity="0.6"/>
  
  <!-- Face features -->
  <ellipse cx="170" cy="140" rx="8" ry="12" fill="#d4a574" opacity="0.5"/>
  <ellipse cx="230" cy="140" rx="8" ry="12" fill="#d4a574" opacity="0.5"/>
  <path d="M180 180 Q200 190 220 180" stroke="#d4a574" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Barber apron -->
  <rect x="140" y="220" width="120" height="150" rx="10" fill="#d4a574" opacity="0.3"/>
  <rect x="150" y="230" width="100" height="130" rx="5" fill="#000000" opacity="0.2"/>
  
  <!-- Scissors pocket -->
  <g transform="translate(180, 250)">
    <path d="M0 0 L30 30 L0 60" stroke="#d4a574" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M40 0 L10 30 L40 60" stroke="#d4a574" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Name badge -->
  <rect x="160" y="300" width="80" height="30" rx="5" fill="#ffffff" opacity="0.2"/>
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#d4a574" opacity="0.7">MASTER BARBER</text>
</svg>
